name: Android Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag, e.g. v1.0.0.0"
        required: true
        default: "v1.0.0.0"
      release_name:
        description: "Release title"
        required: true
        default: "ClassFlow v1.0.0.0"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      CLASSFLOW_RELEASE_STORE_FILE: ${{ secrets.CLASSFLOW_RELEASE_STORE_FILE }}
      CLASSFLOW_RELEASE_STORE_PASSWORD: ${{ secrets.CLASSFLOW_RELEASE_STORE_PASSWORD }}
      CLASSFLOW_RELEASE_KEY_ALIAS: ${{ secrets.CLASSFLOW_RELEASE_KEY_ALIAS }}
      CLASSFLOW_RELEASE_KEY_PASSWORD: ${{ secrets.CLASSFLOW_RELEASE_KEY_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            TAG_NAME="${{ github.event.inputs.tag_name }}"
            RELEASE_NAME="${{ github.event.inputs.release_name }}"
          else
            TAG_NAME="${GITHUB_REF_NAME}"
            RELEASE_NAME="ClassFlow ${GITHUB_REF_NAME}"
          fi
          echo "tag_name=${TAG_NAME}" >> "$GITHUB_OUTPUT"
          echo "release_name=${RELEASE_NAME}" >> "$GITHUB_OUTPUT"

      - name: Build prodRelease APK
        run: ./gradlew :app:assembleProdRelease --console=plain

      - name: Create GitHub Release and upload APKs
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag_name }}
          name: ${{ steps.meta.outputs.release_name }}
          generate_release_notes: true
          files: |
            app/build/outputs/apk/prod/release/*.apk
