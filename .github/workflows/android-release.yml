name: Android Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag, optional (default: v<versionName>)"
        required: false
        default: ""
      release_name:
        description: "Release title, optional (auto generated when empty)"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      CLASSFLOW_RELEASE_STORE_FILE: ${{ secrets.CLASSFLOW_RELEASE_STORE_FILE }}
      CLASSFLOW_RELEASE_STORE_PASSWORD: ${{ secrets.CLASSFLOW_RELEASE_STORE_PASSWORD }}
      CLASSFLOW_RELEASE_KEY_ALIAS: ${{ secrets.CLASSFLOW_RELEASE_KEY_ALIAS }}
      CLASSFLOW_RELEASE_KEY_PASSWORD: ${{ secrets.CLASSFLOW_RELEASE_KEY_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Ensure gradlew is executable
        run: chmod +x gradlew

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          INPUT_TAG_NAME="${{ github.event.inputs.tag_name }}"
          INPUT_RELEASE_NAME="${{ github.event.inputs.release_name }}"

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" && -n "${INPUT_TAG_NAME}" ]]; then
            TAG_NAME="${INPUT_TAG_NAME}"
            RELEASE_NAME="${INPUT_RELEASE_NAME:-ClassFlow ${INPUT_TAG_NAME}}"
          else
            VERSION_NAME="$(sed -nE 's/^[[:space:]]*versionName[[:space:]]*=[[:space:]]*"([^"]+)".*/\1/p' app/build.gradle.kts | head -n1)"
            if [[ -z "${VERSION_NAME}" ]]; then
              echo "Failed to parse versionName from app/build.gradle.kts" >&2
              exit 1
            fi
            TAG_NAME="v${VERSION_NAME}+build.${GITHUB_RUN_NUMBER}"
            RELEASE_NAME="${INPUT_RELEASE_NAME:-ClassFlow v${VERSION_NAME}}"
          fi
          echo "tag_name=${TAG_NAME}" >> "$GITHUB_OUTPUT"
          echo "release_name=${RELEASE_NAME}" >> "$GITHUB_OUTPUT"

      - name: Build prodRelease APK
        run: bash ./gradlew :app:assembleProdRelease --console=plain

      - name: Verify release APK split count
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t apks < <(find app/build/outputs/apk/prod/release -maxdepth 1 -type f -name '*.apk' | sort)
          echo "Detected APKs:"
          printf ' - %s\n' "${apks[@]}"
          if [[ "${#apks[@]}" -ne 3 ]]; then
            echo "Expected exactly 3 ABI APKs, got ${#apks[@]}" >&2
            exit 1
          fi

      - name: Create GitHub Release and upload APKs
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag_name }}
          name: ${{ steps.meta.outputs.release_name }}
          target_commitish: ${{ github.sha }}
          overwrite_files: true
          fail_on_unmatched_files: true
          generate_release_notes: true
          files: |
            app/build/outputs/apk/prod/release/app-prod-armeabi-v7a-release.apk
            app/build/outputs/apk/prod/release/app-prod-arm64-v8a-release.apk
            app/build/outputs/apk/prod/release/app-prod-x86_64-release.apk
