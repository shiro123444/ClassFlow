name: Android Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-prod-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Ensure gradlew is executable
        run: chmod +x gradlew

      - name: Build prodRelease APK
        run: bash ./gradlew :app:assembleProdRelease --console=plain

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: classflow-prod-release-apks
          path: app/build/outputs/apk/prod/release/*.apk
          if-no-files-found: error
